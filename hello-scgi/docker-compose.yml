services:

  nginx:
    image: nginx
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - './nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
